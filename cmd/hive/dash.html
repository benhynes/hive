<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hive dash</title>
<link rel="stylesheet" href="/assets/xterm.min.css">
<script src="/assets/xterm.min.js"></script>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --dim:#8b949e;
    --attention:#f85149; --working:#3fb950; --active:#7ee787; --idle:#58a6ff;
    --quiet:#8b949e; --dead:#484f58; --unreachable:#d29922; --pending:#6e7681;
    --uncontrolled:#6e7681;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--fg); font:14px/1.4 -apple-system,system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:12px; flex-wrap:wrap;
           padding:10px 16px; border-bottom:1px solid var(--border);
           position:sticky; top:0; background:var(--bg); z-index:5; }
  header h1 { font-size:16px; font-weight:600; }
  header h1 b { color:var(--working); }
  .net { color:var(--dim); font-size:12px; }
  input[type=text], select {
    background:var(--panel); color:var(--fg); border:1px solid var(--border);
    border-radius:6px; padding:4px 8px; font-size:13px; }
  label.chk { color:var(--dim); font-size:12px; display:flex; gap:4px; align-items:center; }
  #counts { font-size:12px; color:var(--dim); margin-left:auto; display:flex; gap:10px; }
  #counts b { font-weight:600; }
  #unreach { font-size:11px; color:var(--unreachable); width:100%; }
  #unreach:empty { display:none; }
  main { display:grid; gap:10px; padding:12px 16px;
         grid-template-columns:repeat(auto-fill, minmax(var(--tile,420px), 1fr)); }
  .tile { background:var(--panel); border:1px solid var(--border); border-radius:8px;
          overflow:hidden; cursor:pointer; border-left:3px solid var(--sc,var(--quiet)); }
  .tile:hover { border-color:var(--dim); border-left-color:var(--sc,var(--quiet)); }
  .thead { display:flex; align-items:baseline; gap:8px; padding:6px 10px;
           border-bottom:1px solid var(--border); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--sc,var(--quiet));
         align-self:center; flex:none; }
  .st-working .dot, .st-attention .dot { animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity:.25; } }
  .aname { font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden;
           text-overflow:ellipsis; }
  .ahost { color:var(--dim); font-size:11px; white-space:nowrap; }
  .astat { font-size:11px; color:var(--sc,var(--quiet)); margin-left:auto; white-space:nowrap; }
  pre.screen { font:var(--pfont,10.5px)/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;
               padding:8px 10px; overflow:hidden; white-space:pre; color:#c9d1d9;
               height:calc(var(--plines,16) * var(--pfont,10.5px) * 1.35 + 16px); }
  .st-dead pre.screen, .st-unreachable pre.screen { opacity:.4; }

  /* zoom overlay */
  #zoom { position:fixed; inset:0; background:rgba(1,4,9,.85); z-index:10;
          display:flex; align-items:center; justify-content:center; padding:24px; }
  #zoom[hidden] { display:none; }
  #zbox { background:var(--panel); border:1px solid var(--border); border-radius:10px;
          width:min(1200px,100%); max-height:100%; display:flex; flex-direction:column; }
  #zbox.term { width:min(1680px,100%); }
  #zhead { display:flex; align-items:center; gap:10px; padding:10px 14px;
           border-bottom:1px solid var(--border); flex-wrap:wrap; }
  #zhead .aname { font-size:15px; }
  #zscreen { font:12px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; color:#c9d1d9;
             padding:12px 14px; overflow:auto; white-space:pre; flex:1; min-height:200px; }
  #zterm { flex:1; min-height:200px; overflow:auto; padding:8px 10px; background:#0d1117; }
  #zterm .xterm { height:100%; }
  #zctl { display:flex; gap:6px; padding:10px 14px; border-top:1px solid var(--border);
          flex-wrap:wrap; align-items:center; }
  #ztext { flex:1; min-width:220px; }
  button { background:#21262d; color:var(--fg); border:1px solid var(--border);
           border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; }
  button:hover { border-color:var(--dim); }
  button.warn { color:var(--attention); }
  button.confirm { background:var(--attention); color:#fff; border-color:var(--attention); }
  .keyrow { display:flex; gap:4px; flex-wrap:wrap; }
  .keyrow button { padding:3px 8px; font-size:11px; }
  #zmode { font-size:11px; color:var(--dim); }
  #zerr { color:var(--attention); font-size:12px; width:100%; }
  #zerr:empty { display:none; }
  .frozen { color:var(--unreachable); font-size:11px; }
</style>
</head>
<body>
<header>
  <h1>hive <b>dash</b></h1><span class="net">net {{NET}}</span>
  <input type="text" id="filter" placeholder="filter agents…" size="16">
  <select id="sort">
    <option value="attention">sort: attention</option>
    <option value="name">sort: name</option>
    <option value="host">sort: host</option>
  </select>
  <select id="size">
    <option value="S">size: S</option>
    <option value="M" selected>size: M</option>
    <option value="L">size: L</option>
  </select>
  <label class="chk"><input type="checkbox" id="showdead">show dead</label>
  <span id="counts"></span>
  <span id="unreach"></span>
</header>
<main id="grid"></main>

<div id="zoom" hidden>
  <div id="zbox">
    <div id="zhead">
      <span class="dot"></span><span class="aname" id="zname"></span>
      <span class="astat" id="zstat"></span>
      <span class="frozen" id="zfrozen"></span>
      <button id="zscroll">scrollback</button>
      <button id="zlive" hidden>live</button>
      <button id="zkill" class="warn">kill</button>
      <button id="zclose">close ✕</button>
      <span id="zerr"></span>
    </div>
    <div id="zterm" hidden></div>
    <pre id="zscreen"></pre>
    <div id="zctl">
      <input type="text" id="ztext" placeholder="paste / type long text… (Enter sends + submits)">
      <button id="zsend">send</button>
      <button id="zsendenter">send ⏎</button>
      <div class="keyrow">
        <button data-key="enter">⏎</button>
        <button data-key="esc">Esc</button>
        <button data-key="up">↑</button>
        <button data-key="down">↓</button>
        <button data-key="tab">Tab</button>
        <button data-key="stab">⇧Tab</button>
        <button data-key="ctrlc">^C</button>
      </div>
      <span id="zmode"></span>
    </div>
  </div>
</div>

<script>
"use strict";
const TOKEN = "{{TOKEN}}";
const $ = id => document.getElementById(id);
const ORDER = {attention:0, working:1, active:2, idle:3, quiet:4, pending:5,
               unreachable:6, uncontrolled:7, dead:8};
const SIZES = {S:{tile:"300px", font:"9px",  lines:10},
               M:{tile:"420px", font:"10.5px", lines:16},
               L:{tile:"640px", font:"12px", lines:26}};
const KEYS = {enter:{text:"",enter:true}, esc:{text:"\u001b"}, up:{text:"\u001b[A"},
              down:{text:"\u001b[B"}, tab:{text:"\t"}, stab:{text:"\u001b[Z"},
              ctrlc:{text:"\u0003"}};

let state = {agents:[], unreachable:{}};
let tiles = new Map();          // id -> {el, pre, statEl, nameEl, hostEl}
let zoomId = null, zoomFrozen = false;

// ---- prefs ----
const prefs = JSON.parse(localStorage.getItem("hivedash") || "{}");
if (prefs.sort) $("sort").value = prefs.sort;
if (prefs.size) $("size").value = prefs.size;
if (prefs.showdead) $("showdead").checked = true;
function savePrefs() {
  localStorage.setItem("hivedash", JSON.stringify({
    sort: $("sort").value, size: $("size").value, showdead: $("showdead").checked}));
}

// ---- api ----
async function api(path, opts) {
  const o = opts || {};
  o.headers = Object.assign({"X-Dash-Token": TOKEN}, o.headers);
  const r = await fetch(path, o);
  const body = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(body.error || r.statusText);
  return body;
}

let hashOpened = false;
async function poll() {
  try {
    state = await api("/api/state");
    // Deep link: #z=<agent id> opens that agent's zoom on load.
    if (!hashOpened) {
      hashOpened = true;
      const m = location.hash.match(/^#z=(.+)$/);
      if (m && agentById(decodeURIComponent(m[1]))) openZoom(decodeURIComponent(m[1]));
    }
  } catch (e) {
    $("unreach").textContent = "dash server unreachable: " + e.message;
    setTimeout(poll, 1500);
    return;
  }
  try { render(); } catch (e) { console.error("render:", e); }
  setTimeout(poll, 1500);
}

// ---- rendering ----
function tail(s, n) {
  const lines = (s || "").replace(/\s+$/, "").split("\n");
  return lines.slice(-n).join("\n");
}

function applySize() {
  const sz = SIZES[$("size").value] || SIZES.M;
  const m = document.querySelector("main");
  m.style.setProperty("--tile", sz.tile);
  m.style.setProperty("--pfont", sz.font);
  m.style.setProperty("--plines", sz.lines);
}

function visibleAgents() {
  const f = $("filter").value.trim().toLowerCase();
  const showDead = $("showdead").checked;
  let list = state.agents.filter(a =>
    (showDead || a.status !== "dead") &&
    (!f || a.id.toLowerCase().includes(f) || a.status.includes(f)));
  const s = $("sort").value;
  list.sort((a, b) => {
    if (s === "attention") {
      const d = (ORDER[a.status] ?? 9) - (ORDER[b.status] ?? 9);
      if (d) return d;
    }
    if (s === "host") {
      const d = a.host.localeCompare(b.host);
      if (d) return d;
    }
    return a.id.localeCompare(b.id);
  });
  return list;
}

function makeTile(a) {
  const el = document.createElement("div");
  el.className = "tile";
  const head = document.createElement("div"); head.className = "thead";
  const dot = document.createElement("span"); dot.className = "dot";
  const nameEl = document.createElement("span"); nameEl.className = "aname";
  const hostEl = document.createElement("span"); hostEl.className = "ahost";
  const statEl = document.createElement("span"); statEl.className = "astat";
  head.append(dot, nameEl, hostEl, statEl);
  const pre = document.createElement("pre"); pre.className = "screen";
  el.append(head, pre);
  el.onclick = () => openZoom(a.id);
  return {el, pre, statEl, nameEl, hostEl};
}

function ageStr(s) {
  if (s < 0) return "";
  if (s < 60) return s + "s";
  if (s < 3600) return Math.floor(s / 60) + "m";
  return Math.floor(s / 3600) + "h";
}

function render() {
  applySize();
  const sz = SIZES[$("size").value] || SIZES.M;
  const list = visibleAgents();
  const grid = $("grid");
  const seen = new Set();
  for (const a of list) {
    seen.add(a.id);
    let t = tiles.get(a.id);
    if (!t) { t = makeTile(a); tiles.set(a.id, t); }
    t.el.className = "tile st-" + a.status;
    t.el.style.setProperty("--sc", "var(--" + a.status + ")");
    t.nameEl.textContent = a.name;
    t.hostEl.textContent = "@" + a.host;
    const age = ageStr(a.changed_s);
    t.statEl.textContent = a.status + (age ? " · " + age : "");
    t.pre.textContent = a.err ? "⚠ " + a.err : tail(a.screen, sz.lines);
    grid.appendChild(t.el); // appendChild moves → grid ends up in sorted order
  }
  for (const [id, t] of tiles) if (!seen.has(id)) { t.el.remove(); tiles.delete(id); }

  // counts + title
  const counts = {};
  for (const a of state.agents) counts[a.status] = (counts[a.status] || 0) + 1;
  $("counts").innerHTML = "";
  for (const k of Object.keys(ORDER)) {
    if (!counts[k]) continue;
    const s = document.createElement("b");
    s.style.color = "var(--" + k + ")";
    s.textContent = counts[k] + " " + k;
    $("counts").appendChild(s);
  }
  const att = counts.attention || 0;
  document.title = (att ? "(" + att + "!) " : "") + "hive dash";

  const un = Object.keys(state.unreachable || {}).sort();
  $("unreach").textContent = (state.agents_err ? "agents: " + state.agents_err + " · " : "") +
    (un.length ? "unreachable hosts: " + un.join(", ") : "");

  if (zoomId) renderZoom();
}

// ---- zoom ----
function agentById(id) { return state.agents.find(a => a.id === id); }

// Live-terminal state. When the hub supports /stream, the zoom is a
// real xterm.js terminal fed by the pane's raw output; keystrokes go
// back raw. Old hubs (404/501) fall back to the poll view.
let term = null, termAbort = null, termRetries = 0;

function openZoom(id) {
  zoomId = id; zoomFrozen = false;
  $("zerr").textContent = ""; $("zfrozen").textContent = "";
  $("zlive").hidden = true;
  resetKill();
  $("zoom").hidden = false;
  renderZoom();
  $("zscreen").scrollTop = $("zscreen").scrollHeight;
  termRetries = 0;
  startStream(id);
}

function stopStream() {
  if (termAbort) { termAbort.abort(); termAbort = null; }
  if (term) { term.dispose(); term = null; }
  $("zbox").classList.remove("term");
  $("zterm").hidden = true; $("zterm").innerHTML = "";
  $("zscreen").hidden = false;
  $("zscroll").hidden = false;
  $("zmode").textContent = "keys pass through when the text box isn't focused";
}

async function startStream(id) {
  const ac = new AbortController();
  termAbort = ac;
  let resp;
  try {
    resp = await fetch("/api/stream?agent=" + encodeURIComponent(id),
      {headers: {"X-Dash-Token": TOKEN}, signal: ac.signal});
  } catch (e) { return; } // aborted or network — poll view stays
  if (zoomId !== id || ac !== termAbort) { try { resp.body.cancel(); } catch (e) {} return; }
  if (!resp.ok) { stopStream(); return; } // hub without /stream → poll view
  const cols = parseInt(resp.headers.get("X-Hive-Cols")) || 220;
  const rows = parseInt(resp.headers.get("X-Hive-Rows")) || 50;
  $("zscreen").hidden = true;
  $("zscroll").hidden = true; // xterm keeps its own scrollback
  $("zbox").classList.add("term");
  $("zterm").hidden = false;
  // Fit the pane's fixed width into the box: monospace glyphs are
  // ~0.6em wide, so pick the largest font that fits, clamped readable.
  const avail = $("zterm").clientWidth - 24;
  const fontSize = Math.max(8, Math.min(16, Math.floor(avail / cols / 0.6)));
  term = new Terminal({cols, rows, scrollback: 5000, fontSize,
    fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace",
    theme: {background: "#0d1117", foreground: "#c9d1d9"}});
  term.open($("zterm"));
  term.onData(data => { if (zoomId) sendKeys(data, false, true); });
  term.focus();
  $("zmode").textContent = "live terminal — keys go straight to the pane";
  const reader = resp.body.getReader();
  try {
    for (;;) {
      const {value, done} = await reader.read();
      if (done) break;
      if (term) term.write(value);
      termRetries = 0;
    }
  } catch (e) { /* aborted or dropped */ }
  // Stream ended. If the zoom is still open and the agent alive,
  // reconnect (fresh snapshot); after 3 straight failures fall back.
  if (zoomId === id && ac === termAbort) {
    const a = agentById(id);
    if (a && a.alive && termRetries++ < 3) {
      if (term) { term.dispose(); term = null; }
      $("zterm").innerHTML = "";
      setTimeout(() => { if (zoomId === id && ac === termAbort) startStream(id); }, 800);
    } else {
      stopStream();
    }
  }
}

function closeZoom() { zoomId = null; stopStream(); $("zoom").hidden = true; }

function renderZoom() {
  const a = agentById(zoomId);
  if (!a) { $("zstat").textContent = "gone"; return; }
  $("zname").textContent = a.id;
  $("zstat").textContent = a.status;
  $("zstat").style.color = "var(--" + a.status + ")";
  document.querySelector("#zhead .dot").style.background = "var(--" + a.status + ")";
  if (term) return; // live terminal renders itself
  if (!zoomFrozen) {
    const el = $("zscreen");
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 30;
    el.textContent = a.err ? "⚠ " + a.err : (a.screen || "");
    if (atBottom) el.scrollTop = el.scrollHeight;
  }
}

// Keystrokes are queued through one promise chain: concurrent POSTs on
// separate connections could reach the pane out of order.
let keyQueue = Promise.resolve();
function sendKeys(text, enter, raw) {
  if (!zoomId) return;
  const agent = zoomId;
  $("zerr").textContent = "";
  keyQueue = keyQueue.then(async () => {
    try { await api("/api/keys", {method:"POST",
      body:JSON.stringify({agent, text, enter:!!enter, raw:!!raw})}); }
    catch (e) { $("zerr").textContent = "keys: " + e.message; }
  });
}

$("zsend").onclick = () => { sendKeys($("ztext").value, false); $("ztext").value = ""; };
$("zsendenter").onclick = () => { sendKeys($("ztext").value, true); $("ztext").value = ""; };
$("ztext").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); $("zsendenter").click(); }
  e.stopPropagation();
});
for (const b of document.querySelectorAll(".keyrow button"))
  b.onclick = () => {
    const k = KEYS[b.dataset.key];
    if (term) { sendKeys(k.enter ? "\r" : k.text, false, true); term.focus(); }
    else sendKeys(k.text, !!k.enter);
  };

$("zclose").onclick = closeZoom;
$("zoom").addEventListener("click", e => { if (e.target === $("zoom")) closeZoom(); });

// two-step kill (no confirm() dialogs)
let killArmed = null;
function resetKill() {
  clearTimeout(killArmed); killArmed = null;
  $("zkill").textContent = "kill"; $("zkill").className = "warn";
}
$("zkill").onclick = async () => {
  if (!killArmed) {
    $("zkill").textContent = "really kill?"; $("zkill").className = "confirm";
    killArmed = setTimeout(resetKill, 3000);
    return;
  }
  resetKill();
  try { await api("/api/kill", {method:"POST", body:JSON.stringify({agent:zoomId})}); closeZoom(); }
  catch (e) { $("zerr").textContent = "kill: " + e.message; }
};

$("zscroll").onclick = async () => {
  if (!zoomId) return;
  try {
    const r = await api("/api/read?agent=" + encodeURIComponent(zoomId) + "&lines=300");
    zoomFrozen = true;
    $("zfrozen").textContent = "scrollback (frozen)";
    $("zlive").hidden = false;
    $("zscreen").textContent = r.screen;
    $("zscreen").scrollTop = $("zscreen").scrollHeight;
  } catch (e) { $("zerr").textContent = "read: " + e.message; }
};
$("zlive").onclick = () => {
  zoomFrozen = false; $("zfrozen").textContent = ""; $("zlive").hidden = true; renderZoom();
};

// pass-through keyboard when zoomed and the text box isn't focused
document.addEventListener("keydown", e => {
  if (!zoomId) return;
  if (term) return; // live terminal: xterm.js owns the keyboard
  if (document.activeElement === $("ztext")) return;
  if (e.metaKey || e.altKey) return; // leave browser/OS shortcuts alone
  const map = {Enter:KEYS.enter, Escape:KEYS.esc, ArrowUp:KEYS.up, ArrowDown:KEYS.down,
               ArrowRight:{text:"\u001b[C"}, ArrowLeft:{text:"\u001b[D"},
               Backspace:{text:"\u007f"},
               Tab: e.shiftKey ? KEYS.stab : KEYS.tab};
  let k = map[e.key];
  if (!k && e.key.length === 1) {
    k = e.ctrlKey
      ? (/^[a-z]$/i.test(e.key) ? {text: String.fromCharCode(e.key.toLowerCase().charCodeAt(0) - 96)} : null)
      : {text: e.key};
  }
  if (!k) return;
  e.preventDefault();
  sendKeys(k.text, !!k.enter);
});

for (const id of ["filter", "sort", "size", "showdead"]) {
  $(id).addEventListener("input", () => { savePrefs(); render(); });
}
applySize();
poll();
</script>
</body>
</html>
